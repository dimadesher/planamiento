<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меню — планировщик</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --border: #E8E4DC;
  --border-strong: #C8C2B4;
  --text: #1A1814;
  --text-2: #6B6560;
  --text-3: #A09A92;
  --accent: #2D6A4F;
  --accent-light: #E8F4EE;
  --accent-text: #1B4332;
  --breakfast: #FDF3E3; --breakfast-t: #7D4E17;
  --lunch: #E8F4EE; --lunch-t: #1B4332;
  --dinner: #EAF0FB; --dinner-t: #1A3A6B;
  --snack: #FAE8F0; --snack-t: #6B1A3A;
  --dessert: #F3E8FF; --dessert-t: #5B21B6;
  --danger: #FEE2E2; --danger-t: #991B1B;
  --r: 10px;
  --r-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
}
body {
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
  line-height: 1.5;
}
h1, h2 { font-family: 'Manrope', sans-serif; font-weight: 700; }

/* ── AUTH SCREEN ── */
.auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
}
.auth-logo {
  font-family: 'Manrope', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
}
.auth-sub {
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 32px;
}
.auth-tabs {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1;
  padding: 9px;
  border: none;
  background: none;
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-2);
  transition: all .15s;
}
.auth-tab.active { background: var(--accent); color: #fff; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; letter-spacing: .03em; text-transform: uppercase; }
.form-group input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  transition: border-color .15s;
  outline: none;
}
.form-group input:focus { border-color: var(--accent); background: var(--surface); }
.auth-error { background: var(--danger); color: var(--danger-t); padding: 10px 14px; border-radius: var(--r); font-size: 13px; margin-bottom: 14px; display: none; }
.auth-error.show { display: block; }
.btn-full {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.btn-full:hover { background: #1B4332; }
.btn-full:disabled { opacity: .5; cursor: not-allowed; }

/* ── APP LAYOUT ── */
.app { display: none; min-height: 100vh; flex-direction: column; }
.app.visible { display: flex; }
.topnav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.nav-brand {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--accent);
  margin-right: 32px;
  flex-shrink: 0;
}
.nav-links { display: flex; gap: 0; flex: 1; }
.nav-link {
  padding: 0 16px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 7px;
  border: none;
  background: none;
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.nav-user { font-size: 12px; color: var(--text-2); }
.btn-ghost {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: none;
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-ghost:hover { border-color: var(--border-strong); color: var(--text); background: var(--bg); }
.btn-accent {
  padding: 7px 14px;
  border: none;
  border-radius: var(--r);
  background: var(--accent);
  color: #fff;
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-accent:hover { background: #1B4332; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger-ghost {
  padding: 5px 10px;
  border: 1px solid #FECACA;
  border-radius: var(--r);
  background: none;
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--danger-t);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all .15s;
}
.btn-danger-ghost:hover { background: var(--danger); }

.page { display: none; padding: 32px 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
.page.active { display: block; }

/* ── RECIPES ── */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.page-header h2 { font-size: 26px; }
.search-wrap { position: relative; margin-bottom: 20px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-3); width: 15px; height: 15px; }
.search-input {
  width: 100%;
  padding: 9px 14px 9px 36px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.recipe-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px;
  cursor: pointer;
  transition: all .15s;
  animation: fadeIn .2s ease;
}
.recipe-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow); transform: translateY(-1px); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.rc-emoji { font-size: 30px; margin-bottom: 10px; }
.rc-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.rc-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.cat-tag {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .02em;
}
.cat-breakfast { background: var(--breakfast); color: var(--breakfast-t); }
.cat-lunch { background: var(--lunch); color: var(--lunch-t); }
.cat-dinner { background: var(--dinner); color: var(--dinner-t); }
.cat-snack { background: var(--snack); color: var(--snack-t); }
.cat-dessert { background: var(--dessert); color: var(--dessert-t); }
.rc-time { font-size: 12px; color: var(--text-3); }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-chip { padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px; font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; background: none; color: var(--text-2); transition: all .15s; }
.filter-chip:hover:not(.active) { border-color: var(--border-strong); color: var(--text); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-3); }
.empty-state .es-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
.empty-state p { font-size: 14px; }

/* ── PLAN ── */
.plan-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.period-label { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 20px; flex: 1; min-width: 180px; }
.mode-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.mode-btn {
  padding: 7px 14px;
  border: none;
  background: none;
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-2);
  transition: all .15s;
}
.mode-btn.active { background: var(--accent); color: #fff; }
.month-header-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
.month-day-name { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-3); padding: 4px 0; letter-spacing: .04em; }
.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
/* ── WEEK CALENDAR ── */
.cal-grid { border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; background: var(--surface); }
.cal-header-row { display: grid; grid-template-columns: 80px repeat(7, 1fr); background: var(--bg); border-bottom: 2px solid var(--border); }
.cal-label-spacer { border-right: 1px solid var(--border); }
.cal-day-head { padding: 10px 4px; text-align: center; border-left: 1px solid var(--border); }
.cal-day-name { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-3); }
.cal-day-num { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.2; margin-top: 2px; }
.cal-day-head.today .cal-day-num { color: var(--accent); }
.cal-meal-row { display: grid; grid-template-columns: 80px repeat(7, 1fr); border-top: 1px solid var(--border); height: 86px; overflow: hidden; position: relative; }
.cal-row-label { padding: 10px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; border-right: 1px solid var(--border); display: flex; align-items: flex-start; line-height: 1.3; overflow: hidden; }
.cal-row-label.breakfast { color: var(--breakfast-t); background: var(--breakfast); }
.cal-row-label.lunch { color: var(--lunch-t); background: var(--lunch); }
.cal-row-label.dinner { color: var(--dinner-t); background: var(--dinner); }
.cal-row-label.snack { color: var(--snack-t); background: var(--snack); }
.cal-cell { height: 86px; padding: 5px; border-left: 1px solid var(--border); display: flex; align-items: flex-end; transition: background .12s; position: relative; }
.cal-drop-zone { position: absolute; inset: 0; z-index: 20; pointer-events: none; }
body.dragging-active .cal-drop-zone { pointer-events: auto; }
.cal-chips-layer { position: absolute; left: 80px; top: 0; right: 0; height: 86px; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 26px; align-content: start; gap: 3px 0; padding: 4px 0; pointer-events: none; z-index: 2; overflow: hidden; }
.cal-chips-layer .cal-chip { pointer-events: auto; margin: 0 2px; min-width: 0; }
body.dragging-active .cal-chip { pointer-events: none !important; }
/* ── RECIPE PALETTE ── */
.recipe-palette { margin-top: 20px; }
.palette-group { margin-bottom: 14px; }
.palette-group-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin-bottom: 7px; }
.palette-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.palette-chip { border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 500; cursor: grab; display: flex; align-items: center; gap: 5px; user-select: none; transition: opacity .15s, transform .12s, box-shadow .12s; white-space: nowrap; }
.palette-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.palette-chip:active { cursor: grabbing; transform: none; }
.palette-chip.dragging { opacity: .3; }
.palette-chip.breakfast { background: var(--breakfast); color: var(--breakfast-t); }
.palette-chip.lunch { background: var(--lunch); color: var(--lunch-t); }
.palette-chip.dinner { background: var(--dinner); color: var(--dinner-t); }
.palette-chip.snack { background: var(--snack); color: var(--snack-t); }
.palette-chip.dessert { background: var(--dessert); color: var(--dessert-t); }
.cal-cell.today-col { background: rgba(45,106,79,.04); }
.cal-cell.past-col { opacity: 0.45; }
.cal-cell.past-col .cal-add-btn { display: none; }
.cal-day-head.past .cal-day-num { color: var(--text-3); }
.cal-day-head.past .cal-day-name { opacity: 0.5; }
.cal-chip.past-chip { opacity: 0.4; filter: grayscale(0.6); }
.cal-chip.selected { box-shadow: inset 0 0 0 2px rgba(0,0,0,.18); }
.cal-chip.selected.breakfast { background: #F5C87A; }
.cal-chip.selected.lunch { background: #8ECBA8; }
.cal-chip.selected.dinner { background: #93B8E0; }
.cal-chip.selected.snack { background: #E898BB; }
.cal-chip-rm-sel { display: none; background: none; border: none; cursor: pointer; color: inherit; font-size: 14px; padding: 0; flex-shrink: 0; line-height: 1; opacity: .6; transition: opacity .12s; }
.cal-chip-rm-sel:hover { opacity: 1; }
.cal-chip.selected .cal-chip-rm-sel { display: inline-flex; align-items: center; }
.cal-cell.drag-over { background: var(--accent-light) !important; outline: 2px solid var(--accent); outline-offset: -2px; }
.cal-chip { border-radius: 5px; padding: 4px 6px; font-size: 11px; font-weight: 500; cursor: grab; display: flex; align-items: center; gap: 4px; user-select: none; transition: opacity .15s; position: relative; height: 26px; box-sizing: border-box; }
.cal-chip.resize-cursor { cursor: ew-resize; }
.cal-chip:active { cursor: grabbing; }
.cal-chip.dragging, .cal-chip.moving { opacity: .3; }
.cal-chip.breakfast { background: var(--breakfast); color: var(--breakfast-t); }
.cal-chip.lunch { background: var(--lunch); color: var(--lunch-t); }
.cal-chip.dinner { background: var(--dinner); color: var(--dinner-t); }
.cal-chip.snack { background: var(--snack); color: var(--snack-t); }
.cal-chip-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-cell.extend-over { background: rgba(45,106,79,.15) !important; outline: 2px dashed var(--accent); outline-offset: -2px; }
.cal-add-btn { align-self: flex-start; font-size: 10px; color: var(--text-3); border: 1px dashed var(--border); border-radius: 4px; background: none; cursor: pointer; padding: 2px 7px; transition: all .12s; white-space: nowrap; margin-top: auto; }
.cal-add-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

/* month compact */
.month-day-col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  min-width: 0;
  min-height: 70px;
}
.month-day-col.today { border-color: var(--accent); }
.month-day-num {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 6px 2px;
  color: var(--text-2);
  text-align: right;
}
.month-day-col.today .month-day-num { color: var(--accent); }
.month-meal-dots { padding: 0 4px 4px; display: flex; flex-direction: column; gap: 1px; }
.month-dot {
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
}
.month-dot.breakfast { background: var(--breakfast); color: var(--breakfast-t); }
.month-dot.lunch { background: var(--lunch); color: var(--lunch-t); }
.month-dot.dinner { background: var(--dinner); color: var(--dinner-t); }
.month-dot.snack { background: var(--snack); color: var(--snack-t); }
.month-add-btn {
  font-size: 9px;
  color: var(--text-3);
  border: none;
  background: none;
  cursor: pointer;
  padding: 1px 4px;
  width: 100%;
  text-align: left;
  transition: color .12s;
}
.month-add-btn:hover { color: var(--accent); }

/* ── SHOPPING ── */
.shop-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px 20px; }
.stat-num { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 28px; color: var(--accent); }
.stat-lbl { font-size: 12px; color: var(--text-2); margin-top: 2px; }
.shop-section { margin-bottom: 20px; }
.shop-section-title { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.shop-item { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.shop-item:last-child { border-bottom: none; }
.shop-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.shop-item label { font-size: 14px; cursor: pointer; flex: 1; min-width: 0; }
.shop-item label.checked { text-decoration: line-through; color: var(--text-3); }
.shop-stepper { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.shop-stepper button { width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; font-size: 15px; line-height: 1; color: var(--text-2); transition: all .12s; display: flex; align-items: center; justify-content: center; padding: 0; }
.shop-stepper button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.shop-stepper-val { font-size: 13px; font-weight: 600; color: var(--text); min-width: 28px; text-align: center; white-space: nowrap; }
.shop-unit-sel { border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font-family: 'Manrope', sans-serif; font-size: 11px; color: var(--text-2); padding: 3px 4px; cursor: pointer; outline: none; transition: border-color .12s; max-width: 72px; }
.shop-unit-sel:focus { border-color: var(--accent); }
.shop-rm { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 17px; padding: 0 3px; line-height: 1; flex-shrink: 0; transition: color .12s; }
.shop-rm:hover { color: var(--danger-t); }
.shop-add-row { display: flex; gap: 8px; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.shop-add-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--r); font-family: 'Manrope', sans-serif; font-size: 14px; background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; }
.shop-add-row input:focus { border-color: var(--accent); }
.shop-date-range { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.shop-date-range label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); white-space: nowrap; }
.shop-date-range input[type=date] { border: 1px solid var(--border); border-radius: var(--r); padding: 6px 10px; font-family: 'Manrope', sans-serif; font-size: 13px; background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; }
.shop-date-range input[type=date]:focus { border-color: var(--accent); }
.shop-date-range .sep { color: var(--text-3); }
.shop-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.shop-filter-chip { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-2); cursor: pointer; transition: all .12s; white-space: nowrap; }
.shop-filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.shop-filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  animation: modalIn .18s ease;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: none; } }
.modal h3 { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 20px; }
#modal-detail-body { max-width: 820px; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
.detail-cols { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.detail-left { width: 260px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 18px 20px; overflow-y: auto; }
.detail-right { flex: 1; min-width: 0; padding: 18px 24px; overflow-y: auto; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-2); margin-bottom: 5px; }
.fg input, .fg select, .fg textarea {
  width: 100%;
  padding: 9px 13px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color .15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent); background: var(--surface); }
.fg textarea { height: 80px; resize: vertical; }
.seg-tabs { display: inline-flex; padding: 3px; gap: 2px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); margin-bottom: 14px; }
.seg-tab { border: 0; border-radius: 6px; padding: 7px 12px; background: transparent; color: var(--text-2); font-size: 13px; font-weight: 700; cursor: pointer; transition: background .12s, color .12s; }
.seg-tab.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
.recipe-ai-panel { display: none; border: 1px solid var(--border); border-radius: var(--r); padding: 12px; margin-bottom: 14px; background: var(--bg); }
.recipe-ai-panel.active { display: block; }
.recipe-ai-row { display: flex; gap: 8px; align-items: flex-end; }
.recipe-ai-row .fg { flex: 1; margin-bottom: 0; }
.recipe-ai-status { display: none; font-size: 13px; color: var(--text-2); margin-top: 8px; }
.desc-tools { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 7px; }
.desc-ai-status { display: none; font-size: 13px; color: var(--text-2); margin-top: 6px; }
.ingr-row { display: flex; gap: 6px; margin-bottom: 7px; align-items: center; }
.ingr-row input { flex: 1; min-width: 0; }
.ingr-row .ingr-qty { width: 60px; flex: none; }
.ingr-row .ingr-unit { width: 90px; flex: none; padding: 9px 6px; font-size: 13px; }
.ingr-rm { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 20px; padding: 0 3px; transition: color .12s; }
.ingr-rm:hover { color: var(--danger-t); }
.modal-footer { display: flex; justify-content: flex-end; gap: 9px; margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border); }
.add-cat-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cat-filter-btn { border-radius: 20px; padding: 5px 13px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; transition: all .12s; white-space: nowrap; }
.cat-filter-btn:hover { border-color: var(--border-strong); color: var(--text); }
.cat-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.cat-filter-btn.active.breakfast { background: var(--breakfast-t); border-color: var(--breakfast-t); }
.cat-filter-btn.active.lunch { background: var(--lunch-t); border-color: var(--lunch-t); }
.cat-filter-btn.active.dinner { background: var(--dinner-t); border-color: var(--dinner-t); }
.cat-filter-btn.active.snack { background: var(--snack-t); border-color: var(--snack-t); }
.cat-filter-btn.active.dessert { background: #5B21B6; border-color: #5B21B6; }
.recipe-select-list { border: 1px solid var(--border); border-radius: var(--r); max-height: 260px; overflow-y: auto; }
.rsel-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.rsel-item:last-child { border-bottom: none; }
.rsel-item:hover { background: var(--bg); }
.rsel-item .ri-emoji { font-size: 22px; flex-shrink: 0; }
.rsel-item .ri-info { flex: 1; min-width: 0; }
.rsel-item .ri-name { font-size: 13px; font-weight: 600; }
.rsel-item .ri-sub { font-size: 11px; color: var(--text-2); }

.fab-wrap { position: fixed; bottom: 28px; right: 28px; z-index: 50; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
.fab-menu { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; opacity: 0; transform: translateY(8px); pointer-events: none; transition: opacity .18s, transform .18s; }
.fab-menu.open { opacity: 1; transform: none; pointer-events: auto; }
.fab-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 8px 16px; cursor: pointer; font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 500; color: var(--text); box-shadow: var(--shadow); transition: all .15s; white-space: nowrap; }
.fab-item:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.fab-item-icon { font-size: 17px; flex-shrink: 0; }
.fab {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  transition: background .15s, transform .2s, box-shadow .15s;
  line-height: 1;
  flex-shrink: 0;
}
.fab:hover { background: #1B4332; box-shadow: 0 6px 24px rgba(0,0,0,.25); }
.fab.open { transform: rotate(45deg); }
.fab-backdrop { display: none; position: fixed; inset: 0; z-index: 49; }
.fab-backdrop.open { display: block; }
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--text);
  color: #fff;
  padding: 10px 18px;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  opacity: 0;
  transform: translateY(8px);
  transition: all .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: none; }

.loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 300;
}
.loading-screen .logo { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 32px; color: var(--accent); }
.md-content { font-size: 13px; line-height: 1.7; color: var(--text-2); }
.md-content h1, .md-content h2, .md-content h3 { font-weight: 700; color: var(--text); margin: 14px 0 6px; }
.md-content h1 { font-size: 15px; }
.md-content h2 { font-size: 14px; }
.md-content h3 { font-size: 13px; }
.md-content p { margin-bottom: 8px; }
.md-content ul, .md-content ol { padding-left: 18px; margin-bottom: 8px; }
.md-content li { margin-bottom: 3px; }
.md-content strong { font-weight: 700; color: var(--text); }
.md-content code { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-family: monospace; font-size: 12px; }
.md-content pre { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; overflow-x: auto; margin-bottom: 8px; }
.md-content pre code { background: none; border: none; padding: 0; }
.md-content blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-3); margin: 8px 0; }
.md-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.loader { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

function getIngredientCat(name) {
  const n = name.toLowerCase()
  for (const [cat, { keywords }] of Object.entries(SHOP_CATS)) {
    if (cat === 'other') continue
    if (keywords.some(kw => n.includes(kw))) return cat
  }
  return 'other'
}

// ─── AUTH ───────────────────────────────────────────
let authMode = 'login'

function switchAuthTab(mode) {
  authMode = mode
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && mode === 'login') || (i === 1 && mode === 'register'))
  })
  document.getElementById('name-group').style.display = mode === 'register' ? 'block' : 'none'
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Войти' : 'Создать аккаунт'
  document.getElementById('auth-error').classList.remove('show')
}

async function submitAuth() {
  const email    = document.getElementById('auth-email').value.trim()
  const password = document.getElementById('auth-password').value
  const btn      = document.getElementById('auth-btn')
  const errEl    = document.getElementById('auth-error')
  if (!email || !password) { showAuthError('Введи email и пароль'); return }
  btn.disabled = true
  btn.textContent = '...'
  errEl.classList.remove('show')
  let result
  if (authMode === 'login') {
    result = await sb.auth.signInWithPassword({ email, password })
  } else {
    const name = document.getElementById('auth-name').value.trim() || email.split('@')[0]
    result = await sb.auth.signUp({ email, password, options: { data: { name } } })
  }
  if (result.error) {
    showAuthError(translateError(result.error.message))
    btn.disabled = false
    btn.textContent = authMode === 'login' ? 'Войти' : 'Создать аккаунт'
  }
}

function translateError(msg) {
  if (msg.includes('Invalid login')) return 'Неверный email или пароль'
  if (msg.includes('already registered')) return 'Этот email уже зарегистрирован'
  if (msg.includes('Password should be')) return 'Пароль должен быть не менее 6 символов'
  return msg
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error')
  el.textContent = msg
  el.classList.add('show')
}

async function signOut() {
  await sb.auth.signOut()
}

document.addEventListener('mousemove', e => {
  if (!pointerResizeSpan) return
  if (Math.abs(e.clientX - pointerResizeSpan.startX) + Math.abs(e.clientY - pointerResizeSpan.startY) > 3) {
    pointerResizeSpan.moved = true
  }
  markResizeTarget(e.clientX, e.clientY)
})
document.addEventListener('mousemove', e => {
  if (!pointerMoveSpan) return
  if (Math.abs(e.clientX - pointerMoveSpan.startX) + Math.abs(e.clientY - pointerMoveSpan.startY) > 3) {
    pointerMoveSpan.moved = true
  }
  markMoveTarget(e.clientX, e.clientY)
})
document.addEventListener('mouseup', async e => {
  if (!pointerResizeSpan) return
  const target = markResizeTarget(e.clientX, e.clientY)
  if (target && pointerResizeSpan.moved) {
    suppressChipClick = true
    await resizeSpanTo(target.date, target.mealType)

async function loadRecipes() {
  const { data, error } = await sb.from('recipes').select('*, ingredients(*)').order('created_at', { ascending: false })
  if (!error) recipes = data || []
}

function getIngredientCatalog() {
  const catalog = {}
  recipes.forEach(r => {
    ;(r.ingredients || []).forEach(i => {
      const name = (i.name || '').trim()
      if (!name) return
      const key = name.toLowerCase()
      const unit = parseAmount(i.amount || '').unit || 'г'
      if (!catalog[key]) catalog[key] = { name, units: {} }
      catalog[key].units[unit] = (catalog[key].units[unit] || 0) + 1
    })
  })
  return catalog
}

function getPreferredIngredientUnit(name) {
  const item = getIngredientCatalog()[(name || '').trim().toLowerCase()]
  if (!item) return null
  return Object.entries(item.units).sort((a, b) => b[1] - a[1])[0]?.[0] || null
}

function renderIngredientSuggestions() {
  const dl = document.getElementById('ingredient-suggestions')
  if (!dl) return
  const items = Object.values(getIngredientCatalog()).sort((a, b) => a.name.localeCompare(b.name, 'ru'))
  dl.innerHTML = items.map(i => `<option value="${escHtml(i.name)}"></option>`).join('')
}

function setFilter(cat) {
  filterCat = cat
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat))
  renderRecipes()
}

function renderRecipes() {
  const q = (document.getElementById('recipe-search')?.value || '').toLowerCase()
  const grid = document.getElementById('recipe-grid')
  let f = recipes.filter(r => r.name.toLowerCase().includes(q) || CAT_LABELS[r.category]?.toLowerCase().includes(q))
  if (filterCat !== 'all') f = f.filter(r => r.category === filterCat)
  if (!f.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">🔍</div><p>${recipes.length ? 'Рецепты не найдены' : 'Добавьте первый рецепт!'}</p></div>`
    return
  }
  grid.innerHTML = f.map(r => `
    <div class="recipe-card" onclick="openDetail(${r.id})">
      <div class="rc-emoji">${r.emoji || '🍽️'}</div>
      <div class="rc-name">${r.name}</div>
      <div class="rc-meta">
        <span class="cat-tag cat-${r.category}">${CAT_LABELS[r.category] || r.category}</span>
        ${r.cook_time ? `<span class="rc-time">⏱ ${r.cook_time} мин</span>` : ''}
      </div>
    </div>`).join('')
}

function changeDetailServings(delta) {
  detailCurrentServings = Math.max(1, detailCurrentServings + delta)
  const el = document.getElementById('detail-servings')
  if (el) el.textContent = detailCurrentServings
  document.querySelectorAll('.detail-amt').forEach(span => {
    const base = parseFloat(span.dataset.base)
    const unit = span.dataset.unit
    const raw = span.dataset.raw
    if (!isNaN(base) && base > 0) {
      const scaled = base * detailCurrentServings / detailBaseServings
      const n = scaled % 1 === 0 ? scaled : +scaled.toFixed(1)
      span.textContent = unit ? `${n} ${unit}` : String(n)
    } else {
      span.textContent = raw
    }
  })
  clearTimeout(servingsSaveTimer)
  servingsSaveTimer = setTimeout(saveDetailServings, 700)
}

async function saveDetailServings() {
  if (!detailRecipeId) return
  await sb.from('recipes').update({ servings: detailCurrentServings }).eq('id', detailRecipeId)
  const r = recipes.find(x => x.id === detailRecipeId)
  if (r) {
    r.servings = detailCurrentServings
    detailBaseServings = detailCurrentServings
  }
  toast('Порции сохранены')
}

const UNITS = ['г','кг','мл','л','шт.','ст.л.','ч.л.','щепотка','по вкусу']
const UNIT_ALIASES = {
  'гр':'г','гр.':'г','грамм':'г','граммов':'г','г.':'г',
  'кг.':'кг','килограмм':'кг','килограммов':'кг',
  'мл.':'мл','миллилитр':'мл','миллилитров':'мл',
  'л.':'л','литр':'л','литров':'л',
  'шт':'шт.','штук':'шт.','штуки':'шт.','штука':'шт.',
  'ст. л.':'ст.л.','ст.л':'ст.л.','столовая ложка':'ст.л.','столовых ложек':'ст.л.','столовые ложки':'ст.л.',
  'ч. л.':'ч.л.','ч.л':'ч.л.','чайная ложка':'ч.л.','чайных ложек':'ч.л.','чайные ложки':'ч.л.',
}

function normalizeUnit(u) {
  const lo = u.toLowerCase().trim()
  if (UNITS.includes(lo)) return lo
  return UNIT_ALIASES[lo] || null
}

function parseAmount(amount) {
  if (!amount) return { qty: '', unit: 'г' }
  const s = amount.trim()

  // Whole string is a no-qty unit (щепотка, по вкусу)
  const unitOnly = normalizeUnit(s)
  if (unitOnly) return { qty: '', unit: unitOnly }

  const parts = s.split(/\s+/)
  const firstIsNum = /^[\d.,/]+$/.test(parts[0])

  if (firstIsNum) {
    const rest = parts.slice(1).join(' ')
    if (!rest) return { qty: parts[0], unit: 'г' }
    const unit = normalizeUnit(rest)
    return { qty: parts[0], unit: unit || 'г' }
  }

  // Multi-word non-numeric (shouldn't happen with proper AI output, best-effort)
  const possibleUnit = normalizeUnit(parts.slice(1).join(' '))
  if (possibleUnit) return { qty: parts[0], unit: possibleUnit }

  return { qty: s, unit: 'г' }
}

function addIngrRow(name = '', amount = '') {
  const { qty, unit } = parseAmount(amount)
  const il = document.getElementById('ingr-list')
  const row = document.createElement('div')
  row.className = 'ingr-row'
  row.innerHTML = `
    <input type="text" placeholder="Ингредиент" value="${escHtml(name)}" list="ingredient-suggestions" oninput="syncIngredientUnit(this)">
    <input type="text" class="ingr-qty" placeholder="0" value="${escHtml(qty)}">
    <select class="ingr-unit">${UNITS.map(u => `<option value="${u}"${u === unit ? ' selected' : ''}>${u}</option>`).join('')}</select>
    <button class="ingr-rm" onclick="this.parentElement.remove()" aria-label="Удалить">×</button>`
  il.appendChild(row)
  setTimeout(() => row.querySelector('input')?.focus(), 0)
}

function syncIngredientUnit(input) {
  const unit = getPreferredIngredientUnit(input.value)
  if (!unit) return
  const sel = input.closest('.ingr-row')?.querySelector('.ingr-unit')
  if (sel) sel.value = unit
}

async function saveRecipe() {
  const name = document.getElementById('r-name').value.trim()
  if (!name) { toast('Введи название рецепта'); return }
  const ingredients = getRecipeFormIngredients()

  const payload = {
    name,
    emoji: document.getElementById('r-emoji').value || '🍽️',
    category: document.getElementById('r-cat').value,
    cook_time: parseInt(document.getElementById('r-time').value) || null,
    servings: parseInt(document.getElementById('r-servings').value) || 2,
    description: document.getElementById('r-desc').value.trim() || null,
    user_id: currentUser.id
  }

  let recipeId = editingId
  if (editingId) {
    await sb.from('recipes').update(payload).eq('id', editingId)
    await sb.from('ingredients').delete().eq('recipe_id', editingId)
  } else {
    const { data } = await sb.from('recipes').insert(payload).select().single()
    recipeId = data.id
  }
  if (ingredients.length) {
    await sb.from('ingredients').insert(ingredients.map(i => ({ ...i, recipe_id: recipeId })))
  }
  await loadRecipes()
  renderIngredientSuggestions()
  closeModal('modal-recipe')
  renderRecipes()
  toast(editingId ? 'Рецепт обновлён' : 'Рецепт добавлен!')
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}
function todayKey() { return dateKey(new Date()) }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r }
function getMonday(d) {
  const dt = new Date(d); const day = dt.getDay() || 7
  dt.setDate(dt.getDate() - day + 1); return dt
}

function currentWeekStart() { return addDays(getMonday(new Date()), weekOffset * 7) }
function currentMonthDate() { const n = new Date(); return new Date(n.getFullYear(), n.getMonth() + monthOffset, 1) }

function setMode(m) {
  viewMode = m
  document.getElementById('wm-week').classList.toggle('active', m === 'week')
  document.getElementById('wm-month').classList.toggle('active', m === 'month')
  renderPlan()
}
function navPeriod(dir) {
  if (viewMode === 'week') weekOffset += dir; else monthOffset += dir
  renderPlan()
}
function goToday() { weekOffset = 0; monthOffset = 0; renderPlan() }

function getEntriesForDay(dk) {
  return planEntries.filter(e => e.date === dk)
}

function renderPlan() {
  viewMode === 'week' ? renderWeek() : renderMonth()
  renderPalette()
}

let calDragEntryId = null
let calDragRecipeId = null
let calDragSpan = null
let calResizeSpan = null
let pointerResizeSpan = null
let pointerMoveSpan = null
let suppressChipClick = false
let selectedSpanEntryIds = null

function clearDragState() {
  calDragEntryId = null
  calDragRecipeId = null
  calDragSpan = null
  calResizeSpan = null
}

function clearPointerResize() {
  pointerResizeSpan = null
  calResizeSpan = null
  document.body.classList.remove('dragging-active')
  document.querySelectorAll('.cal-chip.resizing').forEach(c => c.classList.remove('resizing'))
  document.querySelectorAll('.cal-chip.resize-cursor').forEach(c => c.classList.remove('resize-cursor'))
  document.querySelectorAll('.cal-cell.extend-over').forEach(c => c.classList.remove('extend-over'))
}

function clearPointerMove() {
  pointerMoveSpan = null
  calDragSpan = null
  calDragEntryId = null
  document.body.classList.remove('dragging-active')
  document.querySelectorAll('.cal-chip.moving').forEach(c => c.classList.remove('moving'))
  document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'))
}

function onChipClick(e, entryIds) {
  if (suppressChipClick) { suppressChipClick = false; return }
  e.stopPropagation()
  document.querySelectorAll('.cal-chip.selected').forEach(c => c.classList.remove('selected'))
  const key = entryIds.join(',')
  if (selectedSpanEntryIds?.join(',') === key) {
    selectedSpanEntryIds = null
  } else {
    selectedSpanEntryIds = entryIds
    e.currentTarget.classList.add('selected')
  }
}

function getResizeSideFromPoint(el, clientX) {
  const rect = el.getBoundingClientRect()
  const zone = Math.min(24, rect.width / 3)
  if (clientX <= rect.left + zone) return 'left'
  if (clientX >= rect.right - zone) return 'right'
  return null
}

function getCalendarCellFromPoint(clientX, clientY) {
  const el = document.elementFromPoint(clientX, clientY)
  return el?.closest?.('.cal-cell') || null
}

function markResizeTarget(clientX, clientY) {
  document.querySelectorAll('.cal-cell.extend-over').forEach(c => c.classList.remove('extend-over'))
  if (!pointerResizeSpan) return null
  const cell = getCalendarCellFromPoint(clientX, clientY)
  if (!cell) return null
  const date = cell.dataset.date
  const mealType = cell.dataset.meal
  if (canResizeSpanTo(date, mealType)) {
    cell.classList.add('extend-over')
    return { date, mealType }
  }
  return null
}

function onChipMouseDown(e, span) {
  if (e.button !== 0) return
  if (e.target.closest('.cal-chip-rm-sel')) return
  const side = getResizeSideFromPoint(e.currentTarget, e.clientX)
  e.preventDefault()
  e.stopPropagation()
  if (!side) {
    pointerMoveSpan = { ...span, moved: false, startX: e.clientX, startY: e.clientY }
    if (span.entryIds.length === 1) calDragEntryId = span.entryIds[0]
    else calDragSpan = pointerMoveSpan
    document.body.classList.add('dragging-active')
    e.currentTarget.classList.add('moving')
    markMoveTarget(e.clientX, e.clientY)
    return
  }
  pointerResizeSpan = { ...span, side, moved: false, startX: e.clientX, startY: e.clientY }
  calResizeSpan = pointerResizeSpan
  document.body.classList.add('dragging-active')
  e.currentTarget.classList.add('resizing')
  markResizeTarget(e.clientX, e.clientY)
}

function markMoveTarget(clientX, clientY) {
  document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'))
  if (!pointerMoveSpan) return null
  const cell = getCalendarCellFromPoint(clientX, clientY)
  if (!cell) return null
  cell.classList.add('drag-over')
  return { date: cell.dataset.date, mealType: cell.dataset.meal }
}

async function movePointerSpanTo(span, date, mealType) {
  if (span.entryIds.length === 1) {
    await moveSingleEntryTo(span.entryIds[0], date, mealType)
    return
  }
  calDragSpan = span
  await moveSpanTo(date, mealType)
}

function onChipMouseMove(e) {
  if (pointerResizeSpan || pointerMoveSpan) return
  e.currentTarget.classList.toggle('resize-cursor', !!getResizeSideFromPoint(e.currentTarget, e.clientX))
}

function onChipMouseLeave(e) {
  if (!pointerResizeSpan && !pointerMoveSpan) e.currentTarget.classList.remove('resize-cursor')
}

function onDropZoneOver(e, date, mealType) {
  e.preventDefault()
  const cell = e.currentTarget.parentElement
  document.querySelectorAll('.cal-cell.drag-over,.cal-cell.extend-over').forEach(c => c.classList.remove('drag-over','extend-over'))
  if (calResizeSpan) {
    if (canResizeSpanTo(date, mealType)) {
      e.dataTransfer.dropEffect = 'copy'
      cell.classList.add('extend-over')
    }
  } else if (calDragSpan || calDragEntryId || calDragRecipeId) {
    e.dataTransfer.dropEffect = calDragRecipeId ? 'copy' : 'move'
    cell.classList.add('drag-over')
  }
}
function onDropZoneLeave(e) {
  e.currentTarget.parentElement.classList.remove('drag-over','extend-over')
}
async function onDropZoneDrop(e, date, mealType) {
  e.preventDefault()
  document.querySelectorAll('.cal-cell.drag-over,.cal-cell.extend-over').forEach(c => c.classList.remove('drag-over','extend-over'))
  if (calResizeSpan) {
    await resizeSpanTo(date, mealType)
    clearDragState(); return
  }
  if (calDragSpan) {
    await moveSpanTo(date, mealType)
    clearDragState(); return
  }
  if (calDragEntryId) {
    await moveSingleEntryTo(calDragEntryId, date, mealType)
    calDragEntryId = null
  } else if (calDragRecipeId) {
    const { data, error } = await sb.from('plan_entries').insert({
      date, meal_type: mealType, recipe_id: calDragRecipeId, user_id: currentUser.id
    }).select().single()
    if (!error && data) { planEntries.push(data); renderPlan() }
    calDragRecipeId = null
  }
}

function datesInRange(startDate, endDate) {
  const dates = []
  const cur = new Date(startDate + 'T00:00:00')
  while (dateKey(cur) <= endDate) {
    dates.push(dateKey(cur))
    cur.setDate(cur.getDate() + 1)
  }
  return dates
}

function addDaysToKey(dk, n) {
  return dateKey(addDays(new Date(dk + 'T00:00:00'), n))
}

function spanLength(startDate, endDate) {
  return datesInRange(startDate, endDate).length
}

function hasPlanEntry(dk, mealType, recipeId, excludeIds = []) {
  return planEntries.some(x =>
    x.date === dk &&
    x.meal_type === mealType &&
    x.recipe_id === recipeId &&
    !excludeIds.includes(x.id)
  )
}

async function insertPlanDates(recipeId, mealType, dates, excludeIds = []) {
  const uniqueDates = [...new Set(dates)]
    .filter(dk => !hasPlanEntry(dk, mealType, recipeId, excludeIds))
  if (!uniqueDates.length) return []
  const rows = uniqueDates.map(d => ({ date: d, meal_type: mealType, recipe_id: recipeId, user_id: currentUser.id }))
  const { data, error } = await sb.from('plan_entries').insert(rows).select()
  if (error) { toast('Не удалось обновить план'); return null }
  return data || []
}

async function deletePlanIds(entryIds) {
  if (!entryIds?.length) return true
  const { error } = await sb.from('plan_entries').delete().in('id', entryIds)
  if (error) { toast('Не удалось удалить старые дни'); return false }
  return true
}

async function replaceEntries(entryIds, recipeId, mealType, dates) {
  const inserted = await insertPlanDates(recipeId, mealType, dates, entryIds)
  if (inserted === null) return
  const deleted = await deletePlanIds(entryIds)
  if (!deleted) { await loadPlan(); renderPlan(); return }
  planEntries = planEntries.filter(x => !entryIds.includes(x.id))
  planEntries.push(...inserted)
  selectedSpanEntryIds = null
  renderPlan()
}

async function moveSingleEntryTo(entryId, date, mealType) {
  const entry = planEntries.find(x => x.id === entryId)
  if (!entry) return
  await replaceEntries([entryId], entry.recipe_id, mealType, [date])
}

async function moveSpanTo(date, mealType) {
  if (!calDragSpan) return
  const len = spanLength(calDragSpan.startDate, calDragSpan.endDate)
  const dates = Array.from({ length: len }, (_, i) => addDaysToKey(date, i))
  await replaceEntries(calDragSpan.entryIds, calDragSpan.recipeId, mealType, dates)
}

function canResizeSpanTo(date, mealType) {
  if (!calResizeSpan || mealType !== calResizeSpan.mealType) return false
  return calResizeSpan.side === 'left'
    ? date <= calResizeSpan.endDate
    : date >= calResizeSpan.startDate
}

async function resizeSpanTo(date, mealType) {
  if (!canResizeSpanTo(date, mealType)) return
  const span = calResizeSpan
  const nextStart = span.side === 'left' ? date : span.startDate
  const nextEnd = span.side === 'right' ? date : span.endDate
  const nextDates = datesInRange(nextStart, nextEnd)
  const keepDates = datesInRange(span.startDate, span.endDate)
  const removeIds = span.entryIds.filter((id, i) => !nextDates.includes(keepDates[i]))
  const addDates = nextDates.filter(dk => !keepDates.includes(dk))
  const inserted = await insertPlanDates(span.recipeId, span.mealType, addDates, span.entryIds)
  if (inserted === null) return
  const deleted = await deletePlanIds(removeIds)
  if (!deleted) { await loadPlan(); renderPlan(); return }
  planEntries = planEntries.filter(x => !removeIds.includes(x.id))
  planEntries.push(...inserted)
  selectedSpanEntryIds = null
  renderPlan()
}

function getChipSpans(weekEntries, days, mealType) {
  const dayKeys = days.map(d => dateKey(d))
  const spans = []
  const byRecipe = {}
  weekEntries.filter(e => e.meal_type === mealType).forEach(e => {
    if (!byRecipe[e.recipe_id]) byRecipe[e.recipe_id] = []
    byRecipe[e.recipe_id].push(e)
  })
  Object.entries(byRecipe).forEach(([ridStr, rEntries]) => {
    const rid = +ridStr
    const dayIdxs = []
    dayKeys.forEach((dk, i) => { if (rEntries.some(e => e.date === dk)) dayIdxs.push(i) })
    let i = 0
    while (i < dayIdxs.length) {
      const spanStart = dayIdxs[i]
      let spanEnd = spanStart
      const spanEntryIds = []
      const addE = idx => { const e = rEntries.find(e => e.date === dayKeys[idx]); if (e) spanEntryIds.push(e.id) }
      addE(spanStart)
      while (i + 1 < dayIdxs.length && dayIdxs[i + 1] === dayIdxs[i] + 1) {
        i++; spanEnd = dayIdxs[i]; addE(spanEnd)
      }
      spans.push({ rid, startIdx: spanStart, endIdx: spanEnd, spanEntryIds, startDate: dayKeys[spanStart], endDate: dayKeys[spanEnd] })
      i++
    }
  })
  return spans
}

async function removeSpan(entryIds) {
  if (!entryIds?.length) return
  const { error } = await sb.from('plan_entries').delete().in('id', entryIds)
  if (!error) { planEntries = planEntries.filter(x => !entryIds.includes(x.id)); renderPlan() }
}

function onCalDragEnd(e) {
  document.body.classList.remove('dragging-active')
  document.querySelectorAll('.cal-chip.dragging,.palette-chip.dragging').forEach(c => c.classList.remove('dragging'))
  document.querySelectorAll('.cal-cell.drag-over,.cal-cell.extend-over').forEach(c => { c.classList.remove('drag-over'); c.classList.remove('extend-over') })
  clearDragState()
}
function onPaletteDragStart(e, recipeId) {
  clearDragState()
  calDragRecipeId = recipeId
  document.body.classList.add('dragging-active')
  e.dataTransfer.effectAllowed = 'copy'
  e.dataTransfer.setData('text/plain', String(recipeId))
  setTimeout(() => e.target.classList.add('dragging'), 0)
}
function renderPalette() {
  const el = document.getElementById('recipe-palette')
  if (!el) return
  if (!recipes.length || viewMode !== 'week') { el.innerHTML = ''; return }
  const catOrder = ['breakfast','lunch','dinner','snack','dessert']

  recipes.forEach(r => { if (!grouped[r.category]) grouped[r.category] = []; grouped[r.category].push(r) })
  el.innerHTML = catOrder.filter(c => grouped[c]?.length).map(cat => `
    <div class="palette-group">
      <div class="palette-group-title">${CAT_LABELS[cat] || cat}</div>
      <div class="palette-chips">
        ${grouped[cat].map(r => `
          <div class="palette-chip ${cat}" draggable="true"
            ondragstart="onPaletteDragStart(event,${r.id})"
            ondragend="onCalDragEnd(event)">
            ${r.emoji || '🍽️'} ${escHtml(r.name)}

function renderWeek() {
  const start = currentWeekStart()
  const end = addDays(start, 6)
  const today = todayKey()
  const sm = RU_MONTHS_GEN[start.getMonth()], em = RU_MONTHS_GEN[end.getMonth()]
  document.getElementById('period-label').textContent =
    start.getMonth() === end.getMonth()
      ? `${start.getDate()}–${end.getDate()} ${sm} ${start.getFullYear()}`
      : `${start.getDate()} ${sm} – ${end.getDate()} ${em} ${start.getFullYear()}`

  const days = Array.from({ length: 7 }, (_, i) => addDays(start, i))
  document.getElementById('plan-container').innerHTML = `
    <div class="cal-grid">
      <div class="cal-header-row">
        <div class="cal-label-spacer"></div>
        ${days.map((d, i) => {
          const dk = dateKey(d)
          const isToday = dk === today
          const isPast = dk < today
          return `<div class="cal-day-head${isToday ? ' today' : isPast ? ' past' : ''}">
            <div class="cal-day-name">${RU_DAYS[i]}</div>
            <div class="cal-day-num">${d.getDate()}</div>
          </div>`
        }).join('')}
      </div>
      ${MEAL_TYPES.map(mt => {
        const weekEntries = planEntries.filter(e => days.some(d => dateKey(d) === e.date))
        const spans = getChipSpans(weekEntries, days, mt.key)
        return `
        <div class="cal-meal-row">
          <div class="cal-row-label ${mt.key}">${mt.label}</div>
          ${days.map(d => {
            const dk = dateKey(d)
            const isToday = dk === today
            const isPast = dk < today
            return `<div class="cal-cell${isToday ? ' today-col' : isPast ? ' past-col' : ''}" data-date="${dk}" data-meal="${mt.key}">
              <div class="cal-drop-zone"
                ondragover="onDropZoneOver(event,'${dk}','${mt.key}')"
                ondragleave="onDropZoneLeave(event)"
                ondrop="onDropZoneDrop(event,'${dk}','${mt.key}')"></div>
              <button class="cal-add-btn" onclick="openAddModal('${dk}','${mt.key}','${mt.label}',${d.getDate()},'${RU_MONTHS_GEN[d.getMonth()]}')">+ добавить</button>
            </div>`
          }).join('')}
          <div class="cal-chips-layer">
            ${spans.map(span => {
              const r = recipes.find(x => x.id === span.rid)
              if (!r) return ''
              const eids = JSON.stringify(span.spanEntryIds)
              const spanData = JSON.stringify({
                entryIds: span.spanEntryIds,
                recipeId: span.rid,
                mealType: mt.key,
                startDate: span.startDate,
                endDate: span.endDate,
              })
              const isPastSpan = span.endDate < today
              return `<div class="cal-chip ${mt.key}${isPastSpan ? ' past-chip' : ''}"
                style="grid-column:${span.startIdx + 1}/${span.endIdx + 2}"
                draggable="false"
                onmousedown='onChipMouseDown(event,${spanData})'
                onmousemove="onChipMouseMove(event)"
                onmouseleave="onChipMouseLeave(event)"
                onclick="onChipClick(event,${eids})">
                <span class="cal-chip-name" title="${escHtml(r.name)}">${r.emoji || '🍽️'} ${escHtml(r.name)}</span>
                <button class="cal-chip-rm-sel" onclick="event.stopPropagation();selectedSpanEntryIds=null;removeSpan(${eids})">×</button>
              </div>`
            }).join('')}
          </div>
        </div>`
      }).join('')}
    </div>`
}

function renderMonth() {
  const base = currentMonthDate()
  const today = todayKey()
  document.getElementById('period-label').textContent = `${RU_MONTHS_FULL[base.getMonth()]} ${base.getFullYear()}`
  const firstDay = (base.getDay() || 7) - 1
  const daysInMonth = new Date(base.getFullYear(), base.getMonth() + 1, 0).getDate()
  let html = `
    <div class="month-header-row">${RU_DAYS.map(d => `<div class="month-day-name">${d}</div>`).join('')}</div>
    <div class="month-grid">
    ${'<div></div>'.repeat(firstDay)}`
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(base.getFullYear(), base.getMonth(), day)
    const dk = dateKey(d), isToday = dk === today
    const entries = getEntriesForDay(dk)
    html += `<div class="month-day-col${isToday ? ' today' : ''}">
      <div class="month-day-num">${day}</div>
      <div class="month-meal-dots">
        ${MEAL_TYPES.map(mt => {
          const meals = entries.filter(e => e.meal_type === mt.key)
          return meals.slice(0, 2).map(e => {
            const r = recipes.find(x => x.id === e.recipe_id)
            return r ? `<div class="month-dot ${mt.key}" title="${r.name}">${r.emoji || '🍽️'} ${r.name}</div>` : ''
          }).join('')
        }).join('')}
        <button class="month-add-btn" onclick="openAddModal('${dk}','breakfast','Завтрак',${day},'${RU_MONTHS_GEN[d.getMonth()]}')">+</button>
      </div>
    </div>`
  }
  html += `</div>`
  document.getElementById('plan-container').innerHTML = html
}

// ─── SHOPPING ────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function parseQtyUnit(amount) {
  const m = amount.trim().match(/^([\d.,]+)\s*(.*)$/)
  if (m) {
    const qty = parseFloat(m[1].replace(',', '.'))
    if (!isNaN(qty)) return { qty, unit: m[2].trim() }
  }
  return { qty: null, unit: amount.trim() }
}

function formatSums(sums, extras) {
  const parts = []
  for (const [unit, qty] of Object.entries(sums)) {
    const n = qty % 1 === 0 ? qty : +qty.toFixed(1)
    parts.push(unit ? `${n} ${unit}` : String(n))
  }
  parts.push(...[...new Set(extras)])
  return parts.join(' + ')
}

function initShopDates() {
  const start = currentWeekStart()
  shopFromDate = dateKey(start)
  shopToDate = dateKey(addDays(start, 6))
}

async function genShopping() {
  if (!shopFromDate || !shopToDate) initShopDates()
  const fromEl = document.getElementById('shop-from')
  const toEl = document.getElementById('shop-to')
  if (fromEl) fromEl.value = shopFromDate
  if (toEl) toEl.value = shopToDate

  const prev = shopping
  const all = {}
  const filtered = planEntries.filter(e => e.date >= shopFromDate && e.date <= shopToDate)
  filtered.forEach(e => {
    const r = recipes.find(x => x.id === e.recipe_id)
    if (!r) return
    ;(r.ingredients || []).forEach(i => {
      if (!i.name) return
      const k = i.name.toLowerCase().trim()
      if (!all[k]) all[k] = { name: i.name, sums: {}, extras: [], amount: '', checked: prev[k]?.checked || false }
      if (i.amount) {
        const p = parseQtyUnit(i.amount)
        if (p.qty !== null) {
          all[k].sums[p.unit] = (all[k].sums[p.unit] || 0) + p.qty
        } else {
          if (!all[k].extras.includes(i.amount)) all[k].extras.push(i.amount)
        }
      }
    })
  })
  for (const k in all) all[k].amount = formatSums(all[k].sums, all[k].extras)
  shopping = { ...all }
  for (const k in customShoppingItems) shopping[k] = customShoppingItems[k]
  renderShopping()
  toast('Список обновлён!')
}

function renderShopping() {
  const el = document.getElementById('shopping-content')
  // sync date inputs
  if (shopFromDate || shopToDate) {
    const fromEl = document.getElementById('shop-from')
    const toEl = document.getElementById('shop-to')
    if (fromEl && shopFromDate) fromEl.value = shopFromDate
    if (toEl && shopToDate) toEl.value = shopToDate
  }

  const allItems = Object.values(shopping)
  const keys = Object.keys(shopping)
  const periodEntries = (shopFromDate && shopToDate)
    ? planEntries.filter(e => e.date >= shopFromDate && e.date <= shopToDate)
    : planEntries
  const checked = allItems.filter(i => i.checked).length

  if (!allItems.length) {
    const hasPlan = planEntries.length > 0
    el.innerHTML = `<div class="empty-state"><div class="es-icon">🛒</div><p>${hasPlan ? 'Нажми «Обновить» чтобы собрать список' : 'Сначала добавь блюда в планировщик'}</p></div>`
    return
  }

  // build category filter chips (only cats that have items)
  const presentCats = [...new Set(allItems.map(item => getIngredientCat(item.name)))]
  const catChips = [
    { key: 'all', label: 'Все' },
    ...Object.entries(SHOP_CATS).filter(([k]) => presentCats.includes(k)).map(([k, v]) => ({ key: k, label: v.label }))
  ]

  // filter items by selected cat
  const visibleKeys = shopCatFilter === 'all'
    ? keys
    : keys.filter(k => getIngredientCat(shopping[k].name) === shopCatFilter)

  el.innerHTML = `
    <div class="shop-stats">
      <div class="stat-card"><div class="stat-num">${allItems.length}</div><div class="stat-lbl">позиций</div></div>
      <div class="stat-card"><div class="stat-num">${periodEntries.length}</div><div class="stat-lbl">блюд</div></div>
      <div class="stat-card"><div class="stat-num">${checked}/${allItems.length}</div><div class="stat-lbl">куплено</div></div>
    </div>
    <div class="shop-filters">
      ${catChips.map(c => `<button class="shop-filter-chip${shopCatFilter === c.key ? ' active' : ''}" onclick="shopCatFilter='${c.key}';renderShopping()">${c.label}</button>`).join('')}
    </div>
    <div class="shop-section">
      ${visibleKeys.map(k => {
        const item = shopping[k]
        const i = keys.indexOf(k)
        const p = item.amount && item.amount !== '—' ? parseQtyUnit(item.amount) : { qty: null, unit: 'г' }
        const qtyVal = p.qty !== null ? (p.qty % 1 === 0 ? p.qty : +p.qty.toFixed(1)) : 0
        const unitVal = p.unit || 'г'
        const unitOpts = UNITS.map(u => `<option value="${u}"${u === unitVal ? ' selected' : ''}>${u}</option>`).join('')
        return `<div class="shop-item">
          <input type="checkbox" id="si${i}" ${item.checked ? 'checked' : ''} onchange="toggleShop('${k}',this.checked)">
          <label for="si${i}" class="${item.checked ? 'checked' : ''}">${escHtml(item.name)}</label>
          <div class="shop-stepper">
            <button onclick="stepShopAmt(${i},-1)">−</button>
            <span class="shop-stepper-val" id="sa-${i}">${qtyVal || '—'}</span>
            <button onclick="stepShopAmt(${i},1)">+</button>
            <select class="shop-unit-sel" id="su-${i}" onchange="changeShopUnit(${i},this.value)">${unitOpts}</select>
          </div>
        </div>`
      }).join('')}
      <div class="shop-add-row">
        <input type="text" id="custom-item-name" placeholder="Добавить продукт..." onkeydown="if(event.key==='Enter')addCustomShopItem()">
        <button class="btn-ghost btn-sm" onclick="addCustomShopItem()">+ Добавить</button>
      </div>
    </div>`
}

function toggleShop(k, checked) {
  if (shopping[k]) shopping[k].checked = checked
  const stat = document.querySelector('.stat-card:nth-child(3) .stat-num')
  if (stat) {
    const c = Object.values(shopping).filter(x => x.checked).length
    stat.textContent = `${c}/${Object.keys(shopping).length}`
  }
}

function getStep(unit) {
  if (['г', 'мл'].includes(unit)) return 50
  if (['кг', 'л'].includes(unit)) return 0.5
  return 1
}

function stepShopAmt(idx, delta) {
  const keys = Object.keys(shopping)
  const k = keys[idx]
  const item = shopping[k]
  if (!item) return
  const unitSel = document.getElementById('su-' + idx)
  const unit = unitSel ? unitSel.value : (parseQtyUnit(item.amount || '')?.unit || 'г')
  const p = item.amount && item.amount !== '—' ? parseQtyUnit(item.amount) : { qty: 0, unit }
  const qty = p.qty !== null ? p.qty : 0
  const step = getStep(unit)
  const newQty = Math.max(0, +(qty + delta * step).toFixed(2))
  const n = newQty % 1 === 0 ? newQty : +newQty.toFixed(1)
  item.amount = `${n} ${unit}`
  if (customShoppingItems[k]) customShoppingItems[k].amount = item.amount
  const span = document.getElementById('sa-' + idx)
  if (span) span.textContent = n || '—'
}

function changeShopUnit(idx, unit) {
  const keys = Object.keys(shopping)
  const k = keys[idx]
  const item = shopping[k]
  if (!item) return
  const p = item.amount && item.amount !== '—' ? parseQtyUnit(item.amount) : { qty: 0, unit: 'г' }
  const qty = p.qty !== null ? p.qty : 0
  const n = qty % 1 === 0 ? qty : +qty.toFixed(1)
  item.amount = `${n} ${unit}`
  if (customShoppingItems[k]) customShoppingItems[k].amount = item.amount
}

function removeShopItem(k) {
  delete shopping[k]
  delete customShoppingItems[k]
  renderShopping()
}

function addCustomShopItem() {
  const input = document.getElementById('custom-item-name')
  const name = input?.value.trim()
  if (!name) return
  const k = name.toLowerCase().trim()
  const item = { name, sums: {}, extras: [], amount: '', checked: false }
  shopping[k] = item
  customShoppingItems[k] = item
  input.value = ''
  renderShopping()
  toast(`${name} добавлен`)
}

// ─── FAB ─────────────────────────────────────────────
function toggleFab() {
  const menu = document.getElementById('fab-menu')
  const btn = document.getElementById('fab-main')
  const backdrop = document.getElementById('fab-backdrop')
  const isOpen = menu.classList.contains('open')
  menu.classList.toggle('open', !isOpen)
  btn.classList.toggle('open', !isOpen)
  backdrop.classList.toggle('open', !isOpen)
}
function closeFab() {
  document.getElementById('fab-menu').classList.remove('open')
  document.getElementById('fab-main').classList.remove('open')
  document.getElementById('fab-backdrop').classList.remove('open')
}

// ─── AI SEARCH ───────────────────────────────────────
function openAiSearch() {
  openRecipeModal(null, 'ai')
}

async function fetchRecipeAI(name) {
  const res = await fetch('/.netlify/functions/recipe-ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  })
  if (!res.ok) throw new Error('API error')
  return await res.json()
}

function getRecipeFormIngredients() {
  return Array.from(document.querySelectorAll('#ingr-list .ingr-row')).map(row => {
    const name = row.querySelector('input')?.value.trim()
    const qty = row.querySelector('.ingr-qty')?.value.trim()
    const unit = row.querySelector('.ingr-unit')?.value
    const amount = qty ? `${qty} ${unit}` : ''
    return { name, amount }
  }).filter(i => i.name)
}

async function fetchRecipeDescriptionAI() {
  const name = document.getElementById('r-name').value.trim()
  if (!name) throw new Error('Missing name')
  const recipe = {
    category: document.getElementById('r-cat').value,
    cook_time: parseInt(document.getElementById('r-time').value) || null,
    servings: parseInt(document.getElementById('r-servings').value) || 2,
    ingredients: getRecipeFormIngredients()
  }
  const res = await fetch('/.netlify/functions/recipe-ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mode: 'description', recipe })
  })
  if (!res.ok) throw new Error('API error')
  return await res.json()
}

async function generateDescriptionInForm() {
  const name = document.getElementById('r-name').value.trim()
  if (!name) { toast('Сначала введи название блюда'); document.getElementById('r-name').focus(); return }
  const desc = document.getElementById('r-desc')
  const btn = document.getElementById('desc-ai-btn')
  const undoBtn = document.getElementById('desc-undo-btn')
  const status = document.getElementById('desc-ai-status')
  btn.disabled = true
  btn.textContent = 'Генерируем...'
  status.style.display = 'block'
  status.textContent = 'ИИ пишет шаги по названию и ингредиентам...'
  try {
    const prev = desc.value
    const data = await fetchRecipeDescriptionAI()
    if (prev !== data.description) descUndoStack.push(prev)
    desc.value = data.description || ''
    undoBtn.style.display = descUndoStack.length ? 'inline-flex' : 'none'
    status.textContent = 'Готово. Можно сохранить, вернуть текст или сгенерировать ещё раз.'
    toast('Шаги сгенерированы')
  } catch {
    status.textContent = 'Не удалось сгенерировать шаги. Попробуй ещё раз.'
  } finally {
    btn.disabled = false
    btn.textContent = '✨ Сгенерировать ещё'
  }
}

function undoGeneratedDescription() {
  if (!descUndoStack.length) return
  document.getElementById('r-desc').value = descUndoStack.pop()
  document.getElementById('desc-undo-btn').style.display = descUndoStack.length ? 'inline-flex' : 'none'
  document.getElementById('desc-ai-status').style.display = 'block'
  document.getElementById('desc-ai-status').textContent = 'Вернули предыдущую версию текста.'
}

function applyRecipeToForm(recipe, fallbackName = '') {
  document.getElementById('r-name').value = recipe.name || fallbackName
  document.getElementById('r-emoji').value = recipe.emoji || '🍽️'
  document.getElementById('r-cat').value = recipe.category || 'lunch'
  document.getElementById('r-time').value = recipe.cook_time || ''
  document.getElementById('r-servings').value = recipe.servings || 2
  document.getElementById('r-desc').value = recipe.description || ''
  const il = document.getElementById('ingr-list')
  il.innerHTML = ''
  const ingredients = recipe.ingredients?.length ? recipe.ingredients : [{ name: '', amount: '' }]
  ingredients.forEach(i => addIngrRow(i.name, i.amount))
  document.getElementById('r-name').focus()
}

async function generateRecipeInForm() {
  const aiInput = document.getElementById('recipe-ai-name')
  const name = (aiInput.value || document.getElementById('r-name').value).trim()
  if (!name) { toast('Введи название блюда'); aiInput.focus(); return }
  const btn = document.getElementById('recipe-ai-btn')
  const status = document.getElementById('recipe-ai-status')
  btn.disabled = true
  btn.textContent = 'Генерируем...'
  status.style.display = 'block'
  status.textContent = '✨ ИИ составляет рецепт...'
  try {
    const recipe = await fetchRecipeAI(name)
    applyRecipeToForm(recipe, name)
    status.textContent = 'Готово. Проверь рецепт и сохрани.'
    toast('Рецепт сгенерирован')
  } catch {
    status.textContent = 'Ошибка. Попробуй ещё раз.'
  } finally {
    btn.disabled = false
    btn.textContent = '✨ Сгенерировать'
  }
}

async function searchRecipeAI() {
  const name = document.getElementById('ai-name-input').value.trim()
  if (!name) return
  const btn = document.getElementById('ai-btn')
  const status = document.getElementById('ai-status')
  btn.disabled = true
  btn.textContent = 'Ищем...'
  status.style.display = 'block'
  status.textContent = '✨ ИИ составляет рецепт...'
  try {
    const recipe = await fetchRecipeAI(name)
    closeModal('modal-ai')
    openRecipeModal()
    applyRecipeToForm(recipe, name)
    toast('Рецепт найден! Проверь и сохрани.')
  } catch {
    status.textContent = '❌ Ошибка. Попробуй ещё раз.'
    btn.disabled = false
    btn.textContent = '✨ Найти'
  }
}

// ─── UTILS ───────────────────────────────────────────
function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'))
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'))
  document.getElementById('page-' + p).classList.add('active')
  document.getElementById('nl-' + p).classList.add('active')
  if (p === 'plan') renderPlan()
  if (p === 'shopping') renderShopping()
}

function openModal(id) { document.getElementById(id).classList.add('open') }
function closeModal(id) { document.getElementById(id).classList.remove('open') }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open') })
})

let toastTimer
function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500)
}
</script>
